name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cpu:
    name: CPU baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Check changed-file whitespace
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}" HEAD
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --check "${{ github.event.before }}" HEAD
          else
            git diff-tree --check --root -r --no-commit-id HEAD
          fi

      - name: Build shared package
        run: uv build --project src --sdist --wheel

      - name: Check recipe lockfiles
        shell: bash
        run: |
          set -euo pipefail

          for pyproject in recipes/*/pyproject.toml; do
            recipe_dir="$(dirname "$pyproject")"
            uv lock --check --project "$recipe_dir"
          done

      - name: Build recipe packages
        shell: bash
        run: |
          set -euo pipefail

          build_root="$(mktemp -d "${RUNNER_TEMP}/recipe-builds.XXXXXX")"
          mkdir -p "${RUNNER_TEMP}/recipe-dists"
          git archive --format=tar HEAD | tar -x -C "$build_root"
          cd "$build_root"

          for pyproject in recipes/*/pyproject.toml; do
            recipe_dir="$(dirname "$pyproject")"
            recipe_name="$(basename "$recipe_dir")"
            uv build --project "$recipe_dir" --sdist --wheel --out-dir "${RUNNER_TEMP}/recipe-dists/${recipe_name}"
          done

      - name: Compile Python sources
        run: python -m compileall -q src scripts recipes

      - name: Run CPU tests
        run: uv run --with pytest --with pyyaml pytest tests -q
